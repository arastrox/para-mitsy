name: Frase diaria

# Genera la frase del día con IA y la commitea a data/daily.json.
# El sitio la lee vía /api/daily (raw GitHub), así que NO necesita redeploy.

on:
  schedule:
    - cron: '0 12 * * *' # ~08:00 en Chile (UTC-4)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Generar frase del día
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-daily.mjs

      - name: Commitear si cambió
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/daily.json data/history.json
          if git diff --staged --quiet; then
            echo "Sin cambios"
          else
            git commit -m "Frase del día ($(node -p "require('./data/daily.json').date"))"
            git push
          fi
